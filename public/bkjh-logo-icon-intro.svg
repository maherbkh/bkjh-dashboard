<?xml version="1.0" encoding="UTF-8"?>
<svg id="bkjh_intro" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 555.1 315.4" role="img" aria-label="Backhaus logo intro">
  <defs>
    <style>
      .st0 { fill: #0096d7; }
      .st1 { fill: #ead025; }
      .st2 { fill: #b91377; }
      .st3 { fill: #8a8f95; }
      .st4 { fill: #bfc734; }

      /* Roof: from above; wordmark: from below (same duration, run in parallel) */
      #bkjh-roof {
        transform-box: fill-box;
        transform-origin: center;
        animation: bkjh-roof-in 1s cubic-bezier(0.42, 0, 1, 1) forwards;
      }

      #bkjh-wordmark {
        transform-box: fill-box;
        transform-origin: center;
        animation: bkjh-wordmark-in 1s cubic-bezier(0.42, 0, 1, 1) forwards;
      }

      @keyframes bkjh-roof-in {
        from { opacity: 0; transform: translateY(-36px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes bkjh-wordmark-in {
        from { opacity: 0; transform: translateY(36px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Scale from geometric center of each circle (group fill-box) */
      .bkjh-circle {
        transform-box: fill-box;
        transform-origin: center;
        animation-timing-function: cubic-bezier(0.34, 1.25, 0.64, 1);
        animation-fill-mode: forwards;
        opacity: 0;
        transform: scale(0);
      }
      /* After roof + wordmark (1s), 100ms pause; then circles in fixed shuffle order, 100ms stagger */
      #bkjh-c2 {
        animation-name: bkjh-circle-pop-in;
        animation-duration: 0.55s;
        animation-delay: 1.1s;
      }
      #bkjh-c0 {
        animation-name: bkjh-circle-pop-in;
        animation-duration: 0.55s;
        animation-delay: 1.2s;
      }
      #bkjh-c4 {
        animation-name: bkjh-circle-pop-in;
        animation-duration: 0.55s;
        animation-delay: 1.3s;
      }
      #bkjh-c1 {
        animation-name: bkjh-circle-pop-in;
        animation-duration: 0.55s;
        animation-delay: 1.4s;
      }
      #bkjh-c3 {
        animation-name: bkjh-circle-pop-in;
        animation-duration: 0.55s;
        animation-delay: 1.5s;
      }

      @keyframes bkjh-circle-pop-in {
        0% { opacity: 0; transform: scale(0); }
        55% { opacity: 1; transform: scale(1.1); }
        100% { opacity: 1; transform: scale(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        #bkjh-roof,
        #bkjh-wordmark {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .bkjh-circle {
          animation: none !important;
          opacity: 1 !important;
          transform: scale(1) !important;
        }
      }
    </style>
  </defs>

